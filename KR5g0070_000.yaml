body:
  text: 六根歸道篇寧根固蔕知常守静則真元得以滋益致虚養恬息機洗塵則大道得以延蔓是以古之守道軒冕不顧其榮方丈不欣以羙卓絶乎世慮優游乎玄情則何道不養何玄不立奈何後世之人多懷中士之節兩有存亡之念一則好生而不務以養生一則惡死而不思以避死是以憂危之患不日而來非測之變不時而起雖有攝修之心而無攝修之志雖有超騰之念而無超騰之望斯與碌碌塵士之輩又何異哉故乃今世學道者衆成道者寡矣吾既有念視虔誠當振言以告之貴精白成用而罔半塗之廢矣經曰夫欲守道先須守心謂心可以動可以静可以生可以死其難測也有一猿而奔邪嵠其難防也有五賊而盜真宰若不守之於道遠矣沖虚經曰心屬玄主大道俱與則守道者是冝乎以此爲先也心得其守則意無亂御而必歸我之使耳心意主乎内外又不可以失是宜端形愿容節躬歛己動止以禮而入乎君子之域進退有度而不外賢人之界則怠傲慵慢而不欺我之身矣如其不然則仲尼何謂其身正不令而行行令者尚此況養道乎是先守心然後守身也心正乎内身正乎外則視又不可有非焉是宜却以紛華慎以聲色五色得正而邪者不干吾之目五聲得其節而淫者不干吾之耳於是紅紫不能以奪朱鄭衞不能以亂雅則耳目必得其養而無誘其真矣如其不然則伯夷何以目不視惡色耳不聽淫聲伯夷清人尚此況養道乎是耳目亦宜一守也既視聽得其守其於臭甘也又不可不慎焉是以芬苾之馨不可以養吾之性飲食之菲亦可以資吾之腹五味之來也守其無味五馨之來也得其無馨寥寥以淡杳杳以寂於是鼻舌不爲我之患矣是臭甘又可爲其一守也如其不然則昔人云何謂居臭則壞真處甘則敗炁世俗常流尚此況養道乎則鼻舌又不可縱焉凡此不紊各得其守則六根悉净而大道存焉内則不爲炁役外則不爲事觸則坦坦乎玄榻之上逍遥乎妙舍之中煩惱不干乎三界思慮不撓乎萬神丹可以九轉而不差真可以七寳而不亂涉無爲而到彼岸度有功而入煙霞則六根淤道又不細矣在乎人守之如何爾
